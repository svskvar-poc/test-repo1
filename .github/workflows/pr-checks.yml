name: PR Checks

# Lightweight checks that run on every PR (fast feedback). The heavy
# upstream-tests gate runs later, in the merge queue (see
# merge-queue-upstream.yml). Here we just unit-test the gate logic itself.
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Gate logic unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install pytest
      - name: Run unit tests
        run: python3 -m pytest tests/ -v
